<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans CJK JP','PingFang SC',sans-serif;fill:#1f2937}
    .title{font-size:26px;font-weight:700}
    .subtitle{font-size:15px;fill:#64748b}
    .panel-badge{font-size:15px;font-weight:700;fill:#fff}
    .panel-heading{font-size:19px;font-weight:700}
    .caption{font-size:14px;fill:#334155}
    .caption-strong{font-size:14px;font-weight:700;fill:#0f172a}
    .sticky-text{font-size:11px;font-weight:600;fill:#78350f;text-anchor:middle}
    .customer-label{font-size:12px;font-weight:600;fill:#334155;text-anchor:middle}
    .worker-face{font-size:22px;text-anchor:middle}
    .shop-sign{font-size:14px;font-weight:700;fill:#fff;text-anchor:middle}
    .arrow-line{stroke:#94a3b8;stroke-width:2;fill:none;marker-end:url(#a-gray)}
    .arrow-in{stroke:#10b981;stroke-width:2.5;fill:none;marker-end:url(#a-green)}
    .arrow-out{stroke:#64748b;stroke-width:2;stroke-dasharray:4,3;fill:none;marker-end:url(#a-gray)}
    .arrow-out-red{stroke:#e11d48;stroke-width:2.5;fill:none;marker-end:url(#a-red)}
    .zzz{font-size:20px;fill:#94a3b8;font-style:italic}
  </style>

  <defs>
    <marker id="a-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="a-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="a-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e11d48"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#f8fafc"/>

  <!-- Header -->
  <text x="60" y="50" class="title">用大白话解释：一家总也打不了烊的便利店</text>
  <text x="60" y="76" class="subtitle">把 CursorUIViewService 想象成一家小店。客人 = 你每次按 Caps Lock 或切输入法。看下面三格就明白了。</text>

  <!-- ============ Panel 1: Normal ============ -->
  <g transform="translate(60 110)">
    <!-- panel frame -->
    <rect x="0" y="0" width="360" height="580" fill="#ffffff" stroke="#22c55e" stroke-width="2" rx="12"/>
    <!-- badge -->
    <rect x="20" y="20" width="90" height="30" fill="#22c55e" rx="6"/>
    <text x="65" y="41" class="panel-badge" text-anchor="middle">正常</text>
    <text x="125" y="42" class="panel-heading">该有的样子</text>

    <!-- scene: shop with 0 stickies -->
    <g transform="translate(80 90)">
      <!-- shop roof -->
      <polygon points="0,40 100,0 200,40" fill="#94a3b8"/>
      <!-- shop body -->
      <rect x="10" y="40" width="180" height="140" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
      <!-- sign -->
      <rect x="40" y="52" width="120" height="24" fill="#22c55e" rx="4"/>
      <text x="100" y="70" class="shop-sign">营 业 中</text>
      <!-- door -->
      <rect x="90" y="130" width="30" height="50" fill="#cbd5e1"/>
      <!-- sticky wall (empty) -->
      <rect x="30" y="90" width="140" height="35" fill="#fafafa" stroke="#e2e8f0" stroke-dasharray="3,3"/>
      <text x="100" y="112" class="caption" text-anchor="middle" style="fill:#94a3b8;font-size:11px">墙上便签：0 张</text>
      <!-- worker -->
      <text x="100" y="165" class="worker-face">🧑‍🍳</text>
    </g>

    <!-- flow arrows: in and out -->
    <g transform="translate(30 310)">
      <text x="0" y="12" class="customer-label" text-anchor="start">🚶 客人进</text>
      <path d="M 5 20 L 60 20" class="arrow-in"/>
      <text x="150" y="12" class="customer-label">干活、贴便签、干完撕掉</text>
      <path d="M 250 20 L 300 20" class="arrow-out"/>
      <text x="305" y="24" style="font-size:12px">🚶 客人走</text>
    </g>

    <!-- Result -->
    <g transform="translate(20 360)">
      <rect x="0" y="0" width="320" height="200" fill="#f0fdf4" stroke="#22c55e" stroke-width="1" rx="8"/>
      <text x="16" y="26" class="caption-strong">客人走后：</text>
      <text x="16" y="52" class="caption">• 墙上便签 = 0</text>
      <text x="16" y="76" class="caption">• 店员没事做</text>
      <text x="16" y="100" class="caption">• 老板：「没事了，可以下班」</text>
      <text x="16" y="130" class="caption-strong">→ 店打烊，店员回家 💤</text>
      <text x="16" y="158" class="caption" style="fill:#64748b">下次有客人再开门。</text>
      <text x="16" y="180" class="caption" style="fill:#64748b">进程内存回到 30 MB 的世界。</text>
    </g>
  </g>

  <!-- ============ Panel 2: Bug once ============ -->
  <g transform="translate(440 110)">
    <rect x="0" y="0" width="360" height="580" fill="#ffffff" stroke="#eab308" stroke-width="2" rx="12"/>
    <rect x="20" y="20" width="90" height="30" fill="#eab308" rx="6"/>
    <text x="65" y="41" class="panel-badge" text-anchor="middle">实际</text>
    <text x="125" y="42" class="panel-heading">出 bug 的样子</text>

    <!-- scene: shop with 2 stickies -->
    <g transform="translate(80 90)">
      <polygon points="0,40 100,0 200,40" fill="#94a3b8"/>
      <rect x="10" y="40" width="180" height="140" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect x="40" y="52" width="120" height="24" fill="#eab308" rx="4"/>
      <text x="100" y="70" class="shop-sign">还在营业</text>
      <rect x="90" y="130" width="30" height="50" fill="#cbd5e1"/>
      <!-- sticky wall (2 stickies) -->
      <rect x="30" y="90" width="140" height="35" fill="#fafafa" stroke="#e2e8f0" stroke-dasharray="3,3"/>
      <g transform="translate(50 92) rotate(-3)"><rect width="42" height="30" fill="#fef08a" stroke="#ca8a04" stroke-width="0.5"/><text x="21" y="19" class="sticky-text">进行中</text></g>
      <g transform="translate(105 94) rotate(2)"><rect width="42" height="30" fill="#fef08a" stroke="#ca8a04" stroke-width="0.5"/><text x="21" y="19" class="sticky-text">进行中</text></g>
      <text x="100" y="165" class="worker-face">🧑‍🍳</text>
      <text x="150" y="150" class="caption" style="font-size:14px">🤔</text>
    </g>

    <g transform="translate(30 310)">
      <text x="0" y="12" class="customer-label" text-anchor="start">🚶 客人进</text>
      <path d="M 5 20 L 60 20" class="arrow-in"/>
      <text x="150" y="12" class="customer-label">干活时贴了 5 张，走时只撕了 3 张</text>
      <path d="M 250 20 L 300 20" class="arrow-out-red"/>
      <text x="305" y="24" style="font-size:12px">🚶 客人走</text>
    </g>

    <g transform="translate(20 360)">
      <rect x="0" y="0" width="320" height="200" fill="#fefce8" stroke="#eab308" stroke-width="1" rx="8"/>
      <text x="16" y="26" class="caption-strong">客人走后：</text>
      <text x="16" y="52" class="caption">• 墙上便签 = 2 张（漏撕了）</text>
      <text x="16" y="76" class="caption">• 老板规矩：墙上有便签 =</text>
      <text x="16" y="94" class="caption">  「还有活没干完」= 不能打烊</text>
      <text x="16" y="124" class="caption-strong">→ 店员被逼加班待命</text>
      <text x="16" y="152" class="caption" style="fill:#64748b">店没关，等下一位客人。</text>
      <text x="16" y="174" class="caption" style="fill:#64748b">但两张漏撕的便签永远不会自己消失。</text>
    </g>
  </g>

  <!-- ============ Panel 3: After many days ============ -->
  <g transform="translate(820 110)">
    <rect x="0" y="0" width="320" height="580" fill="#ffffff" stroke="#e11d48" stroke-width="2" rx="12"/>
    <rect x="20" y="20" width="90" height="30" fill="#e11d48" rx="6"/>
    <text x="65" y="41" class="panel-badge" text-anchor="middle">30 天后</text>
    <text x="125" y="42" class="panel-heading">卡死那天</text>

    <!-- scene: shop overflowing with stickies -->
    <g transform="translate(60 90)">
      <polygon points="0,40 100,0 200,40" fill="#94a3b8"/>
      <rect x="10" y="40" width="180" height="140" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect x="40" y="52" width="120" height="24" fill="#e11d48" rx="4"/>
      <text x="100" y="70" class="shop-sign">「未响应」</text>
      <rect x="90" y="130" width="30" height="50" fill="#cbd5e1"/>
      <!-- lots of stickies -->
      <g>
        <g transform="translate(18 82) rotate(-5)"><rect width="26" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/></g>
        <g transform="translate(48 80) rotate(3)"><rect width="26" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/></g>
        <g transform="translate(78 84) rotate(-2)"><rect width="26" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/></g>
        <g transform="translate(108 82) rotate(4)"><rect width="26" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/></g>
        <g transform="translate(138 84) rotate(-3)"><rect width="26" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/></g>
        <g transform="translate(28 104) rotate(2)"><rect width="26" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/></g>
        <g transform="translate(58 106) rotate(-4)"><rect width="26" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/></g>
        <g transform="translate(88 104) rotate(1)"><rect width="26" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/></g>
        <g transform="translate(118 106) rotate(-2)"><rect width="26" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/></g>
        <g transform="translate(148 104) rotate(3)"><rect width="26" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/></g>
        <g transform="translate(38 126) rotate(-3)"><rect width="26" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/></g>
        <g transform="translate(68 128) rotate(4)"><rect width="26" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/></g>
        <g transform="translate(130 128) rotate(-4)"><rect width="26" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/></g>
        <g transform="translate(158 126) rotate(2)"><rect width="26" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="0.4"/></g>
      </g>
      <!-- worker drowning -->
      <text x="100" y="172" class="worker-face">😩</text>
    </g>

    <!-- customer waiting outside -->
    <g transform="translate(30 300)">
      <text x="0" y="18" style="font-size:16px">🚶</text>
      <text x="22" y="14" class="caption" style="font-size:12px">客人在门口</text>
      <text x="22" y="30" class="caption" style="font-size:12px">按了半天没反应</text>
      <text x="140" y="24" class="zzz" text-anchor="middle">⏳ ...</text>
    </g>

    <g transform="translate(20 360)">
      <rect x="0" y="0" width="280" height="200" fill="#fef2f2" stroke="#e11d48" stroke-width="1" rx="8"/>
      <text x="16" y="26" class="caption-strong">现在的店：</text>
      <text x="16" y="52" class="caption">• 墙上贴了 <tspan font-weight="700">几千张</tspan> 漏撕的便签</text>
      <text x="16" y="76" class="caption">• 店员每次处理新客人</text>
      <text x="16" y="94" class="caption">  都要先在便签堆里翻记录</text>
      <text x="16" y="118" class="caption">• 每笔生意慢到 1 秒以上</text>
      <text x="16" y="146" class="caption-strong" style="fill:#991b1b">→ 客人叫半天没人应</text>
      <text x="16" y="170" class="caption" style="fill:#64748b">这就是你在活动监视器里</text>
      <text x="16" y="188" class="caption" style="fill:#64748b">看到的「未响应 / 3.94 GB」。</text>
    </g>
  </g>

</svg>
