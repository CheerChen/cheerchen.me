<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans CJK JP','PingFang SC',sans-serif;fill:#1f2937}
    .title{font-size:28px;font-weight:700}
    .subtitle{font-size:16px;fill:#64748b}
    .colhead{font-size:18px;font-weight:600;fill:#334155}
    .phase-label{font-size:15px;font-weight:600;fill:#0f172a}
    .call{font-size:15px;fill:#1f2937;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .note{font-size:13px;fill:#64748b}
    .ok-tag{font-size:13px;font-weight:600;fill:#0284c7}
    .warn-tag{font-size:14px;font-weight:700;fill:#e11d48}
    .tx-num{font-size:22px;font-weight:700;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;fill:#0f172a}
    .tx-num-warn{font-size:26px;font-weight:800;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;fill:#e11d48}
    .band-conn{fill:#dbeafe;stroke:#3b82f6;stroke-width:1.5}
    .band-disc{fill:#fee2e2;stroke:#e11d48;stroke-width:1.5}
    .band-text{font-size:16px;font-weight:600;fill:#1e40af}
    .band-text-warn{font-size:16px;font-weight:700;fill:#991b1b}
    .phase-box{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.2;rx:8}
    .phase-box-active{fill:#f0f9ff;stroke:#0ea5e9;stroke-width:1.5;rx:8}
    .tx-bar-ok{fill:#93c5fd}
    .tx-bar-warn{fill:#fca5a5;stroke:#e11d48;stroke-width:1.5;stroke-dasharray:4,3}
    .divider{stroke:#e2e8f0;stroke-width:1}
    .arrow-connect{stroke:#3b82f6;stroke-width:2;fill:none;marker-end:url(#arrow-blue)}
    .arrow-disconnect{stroke:#e11d48;stroke-width:2;fill:none;marker-end:url(#arrow-red)}
    .flow-arrow{stroke:#94a3b8;stroke-width:1.5;fill:none;marker-end:url(#arrow-gray)}
  </style>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e11d48"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1200" height="820" fill="#f8fafc"/>

  <!-- Header -->
  <text x="60" y="55" class="title">一次 Caps Lock / 输入法切换：服务在主线程的调用序列</text>
  <text x="60" y="82" class="subtitle">peer 连接→四阶段处理→peer 断开。理论上 transaction 计数应归零，实际残留 2 个 → 每次切换都在漏</text>

  <!-- Column headers -->
  <text x="130" y="130" class="colhead">生命周期</text>
  <text x="440" y="130" class="colhead">服务主线程调用</text>
  <text x="950" y="130" class="colhead">活跃 transaction 计数</text>

  <line x1="60" y1="145" x2="1140" y2="145" class="divider"/>

  <!-- Connect band -->
  <rect x="60" y="165" width="340" height="50" class="band-conn" rx="6"/>
  <text x="80" y="196" class="band-text">peer[NNNNN] 连接进来</text>
  <line x1="410" y1="190" x2="440" y2="190" class="arrow-connect"/>

  <!-- Right side: tx count at start -->
  <rect x="880" y="165" width="60" height="50" class="tx-bar-ok" rx="4"/>
  <text x="910" y="197" class="tx-num" text-anchor="middle">1</text>
  <text x="960" y="197" class="note">连接持有的 base transaction</text>

  <!-- Phase 1 -->
  <text x="80" y="260" class="phase-label">Phase 1</text>
  <text x="80" y="280" class="note">关闭旧光标</text>

  <rect x="440" y="240" width="380" height="70" class="phase-box"/>
  <text x="460" y="268" class="call">setTextCursorIsActive: NO</text>
  <text x="460" y="292" class="call">deactivateInputModeSwitcher</text>

  <rect x="880" y="245" width="65" height="60" class="tx-bar-ok" rx="4"/>
  <text x="912" y="284" class="tx-num" text-anchor="middle">2</text>
  <text x="960" y="278" class="note">+1 handler task tx</text>

  <path d="M 630 315 L 630 335" class="flow-arrow"/>

  <!-- Phase 2 -->
  <text x="80" y="365" class="phase-label">Phase 2</text>
  <text x="80" y="385" class="note">加载新光标视图</text>

  <rect x="440" y="345" width="380" height="94" class="phase-box-active"/>
  <text x="460" y="373" class="call">loadView</text>
  <text x="460" y="395" class="call">setTextCursorIsActive: YES</text>
  <text x="460" y="417" class="call">activateInputModeSwitcher</text>

  <rect x="880" y="355" width="70" height="80" class="tx-bar-ok" rx="4"/>
  <text x="915" y="405" class="tx-num" text-anchor="middle">3</text>
  <text x="960" y="392" class="note">+1 视图加载 tx</text>
  <text x="960" y="410" class="note">占 CGS connection、Mach port</text>

  <path d="M 630 445 L 630 465" class="flow-arrow"/>

  <!-- Phase 3 -->
  <text x="80" y="495" class="phase-label">Phase 3</text>
  <text x="80" y="515" class="note">配置指示器</text>
  <text x="80" y="533" class="warn-tag">⚠ 泄漏源</text>

  <rect x="440" y="475" width="380" height="72" class="phase-box-active"/>
  <text x="460" y="503" class="call">setAccessories</text>
  <text x="460" y="527" class="call">updateCursorAccessories: view count=2</text>

  <rect x="880" y="480" width="70" height="66" class="tx-bar-ok" rx="4"/>
  <text x="915" y="519" class="tx-num" text-anchor="middle">3</text>
  <text x="960" y="510" class="note">handler 完成，但某些分支</text>
  <text x="960" y="528" class="note">忘了 xpc_transaction_end()</text>

  <path d="M 630 552 L 630 572" class="flow-arrow"/>

  <!-- Phase 4 -->
  <text x="80" y="600" class="phase-label">Phase 4</text>
  <text x="80" y="620" class="note">收尾</text>

  <rect x="440" y="580" width="380" height="70" class="phase-box"/>
  <text x="460" y="608" class="call">setTextCursorIsActive: NO</text>
  <text x="460" y="632" class="call">deactivateInputModeSwitcher</text>

  <rect x="880" y="585" width="70" height="63" class="tx-bar-ok" rx="4"/>
  <text x="915" y="622" class="tx-num" text-anchor="middle">3</text>
  <text x="960" y="618" class="note">仍未回收</text>

  <!-- Disconnect band -->
  <line x1="410" y1="700" x2="440" y2="700" class="arrow-disconnect"/>
  <rect x="60" y="675" width="340" height="50" class="band-disc" rx="6"/>
  <text x="80" y="706" class="band-text-warn">peer[NNNNN] 断开</text>

  <!-- Final tx count: expected 0, actual 2 -->
  <rect x="880" y="670" width="80" height="65" class="tx-bar-warn" rx="4"/>
  <text x="920" y="712" class="tx-num-warn" text-anchor="middle">2</text>
  <text x="975" y="695" class="warn-tag">应回到 0，实际残留 2</text>
  <text x="975" y="715" class="note">Remaining transactions after SIGTERM: 2</text>
  <text x="975" y="732" class="note">launchd 见到活 tx → idle exit 被拒</text>

  <!-- Bottom note -->
  <line x1="60" y1="765" x2="1140" y2="765" class="divider"/>
  <text x="60" y="795" class="note">每次 Caps Lock / 输入法切换 = 一次上面这套流程 = 至少 2 个残留 transaction。切换 N 次，pending 队列长 2N，RSS 随之单调走高。</text>
</svg>
