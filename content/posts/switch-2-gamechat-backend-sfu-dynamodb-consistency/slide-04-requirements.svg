<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <style>text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans CJK JP',sans-serif;fill:#1f2937}.tag{font-size:22px;fill:#475569;text-decoration:underline}.title{font-size:52px;font-weight:800}.p{font-size:30px}.sub{font-size:28px;fill:#475569}.bullet{fill:#e11d48}</style>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="1010" y="80" class="tag">システム構成</text>
  <text x="90" y="155" class="title">ゲームチャットのサービス要件</text>
  <g transform="translate(110 240)">
    <polygon points="0,0 14,9 0,18" class="bullet"/>
    <text x="28" y="18" class="p">映像、音声のリアルタイム通信が出来ること</text>
  </g>
  <g transform="translate(110 300)">
    <polygon points="0,0 14,9 0,18" class="bullet"/>
    <text x="28" y="18" class="p">ゲームチャットグループごとに最大 12 人接続可能であること</text>
  </g>
  <g transform="translate(110 360)">
    <polygon points="0,0 14,9 0,18" class="bullet"/>
    <text x="28" y="18" class="p">ユーザーがプレイ中のゲームと並行して動作可能であること</text>
  </g>
  <g transform="translate(170 415)">
    <polygon points="0,0 12,8 0,16" class="bullet"/>
    <text x="24" y="16" class="sub">クライアント負荷が小さいこと</text>
  </g>
  <g transform="translate(170 465)">
    <polygon points="0,0 12,8 0,16" class="bullet"/>
    <text x="24" y="16" class="sub">通信対戦ゲームとも併用可能なように通信帯域を圧迫しないこと</text>
  </g>
</svg>
