  <style>text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans CJK JP',sans-serif;fill:#1f2937}.tag{font-size:22px;fill:#475569;text-decoration:underline}.title{font-size:48px;font-weight:800}.p{font-size:26px}.st{font-size:22px;font-weight:700}.bullet{fill:#e11d48}.line{stroke:#94a3b8;stroke-width:3;marker-end:url(#a)}.gbox{fill:#dcfce7;stroke:#22c55e;stroke-width:3}.box{fill:#fff;stroke:#94a3b8;stroke-width:2}</style>
