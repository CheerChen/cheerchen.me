  <g transform="translate(110 220)"><polygon points="0,0 14,9 0,18" class="bullet"/><text x="28" y="18" class="p">設定する事で『強い整合』の読み取りが行なえる</text></g>
  <g transform="translate(110 275)"><polygon points="0,0 14,9 0,18" class="bullet"/><text x="28" y="18" class="p">確実に整合性が取れるが消費する Capacity Unit は増加する</text></g>
  <g transform="translate(160 400)">
    <rect width="200" height="140" rx="12" class="az"/>
    <text x="80" y="80" class="lbl">AZ1</text>
  </g>
  <g transform="translate(420 400)">
    <rect width="200" height="140" rx="12" class="az"/>
    <text x="80" y="80" class="lbl">AZ2</text>
  </g>
  <g transform="translate(680 400)">
    <rect width="200" height="140" rx="12" class="az"/>
    <text x="80" y="80" class="lbl">AZ3</text>
  </g>
  <line x1="260" y1="395" x2="260" y2="350" class="line"/>
  <text x="220" y="385" class="lbl">強整合</text>
