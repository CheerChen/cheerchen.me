<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/></marker></defs>
  <style>text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans CJK JP',sans-serif;fill:#1f2937}.tag{font-size:22px;fill:#475569;text-decoration:underline}.title{font-size:50px;font-weight:800}.p{font-size:28px}.bullet{fill:#e11d48}.az{fill:#fff;stroke:#94a3b8;stroke-width:2}.lbl{font-size:22px;font-weight:700;fill:#15803d}.line{stroke:#16a34a;stroke-width:3;marker-end:url(#a)}</style>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="860" y="80" class="tag">追加招待の読み込み不整合とその対応例</text>
