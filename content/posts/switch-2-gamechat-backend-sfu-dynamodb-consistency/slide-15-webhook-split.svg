<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <style>text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans CJK JP',sans-serif;fill:#1f2937}.tag{font-size:22px;fill:#475569;text-decoration:underline}.title{font-size:50px;font-weight:800}.p{font-size:28px}.sub{font-size:25px;fill:#475569}.bullet{fill:#e11d48}</style>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="1020" y="80" class="tag">マルチリージョン運用</text>
  <text x="90" y="155" class="title">ウェブフックの負荷分散</text>
