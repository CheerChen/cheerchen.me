  <g transform="translate(170 490)"><polygon points="0,0 12,8 0,16" class="bullet"/><text x="24" y="16" class="sub">Amazon API Gateway、Amazon SQS を経由</text></g>
  <g transform="translate(170 535)"><polygon points="0,0 12,8 0,16" class="bullet"/><text x="24" y="16" class="sub">ECS サービスを分離</text></g>
