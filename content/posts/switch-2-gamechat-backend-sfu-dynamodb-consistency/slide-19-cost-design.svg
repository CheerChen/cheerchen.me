<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <style>text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans CJK JP',sans-serif;fill:#1f2937}.tag{font-size:22px;fill:#475569;text-decoration:underline}.title{font-size:48px;font-weight:800}.p{font-size:26px}.sub{font-size:22px;fill:#334155}.bullet{fill:#e11d48}.cell{fill:#fff;stroke:#cbd5e1;stroke-width:2}.head{fill:#f1f5f9;stroke:#cbd5e1;stroke-width:2}</style>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="900" y="80" class="tag">設計時に意識していたポイント</text>
  <text x="90" y="140" class="title">コスト効率を意識した設計</text>
  <g transform="translate(110 195)"><polygon points="0,0 14,9 0,18" class="bullet"/><text x="28" y="18" class="p">Key-Value ストア</text></g>
  <g transform="translate(110 580)"><polygon points="0,0 14,9 0,18" class="bullet"/><text x="28" y="18" class="p">アクセス種別やサイズにより消費 Capacity Unit が変化する</text></g>
  <g transform="translate(140 245)">
