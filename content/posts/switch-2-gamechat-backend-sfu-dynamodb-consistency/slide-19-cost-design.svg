  <g transform="translate(830 380)">
    <text x="0" y="0" font-size="24" font-weight="700" fill="#dc2626">書き込みのコストが高い</text>
    <path d="M 0 20 L 60 80" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#arr)"/>
    <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/></marker></defs>
