<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/></marker></defs>
  <style>text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans CJK JP',sans-serif;fill:#1f2937}.tag{font-size:22px;fill:#475569;text-decoration:underline}.title{font-size:46px;font-weight:800}.st{font-size:24px;font-weight:700}.dim{opacity:.35}.bad{font-size:30px;font-weight:800;fill:#dc2626}.line{stroke:#94a3b8;stroke-width:3;marker-end:url(#a)}</style>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="980" y="80" class="tag">状態遷移と結果整合</text>
  <text x="90" y="145" class="title">サーバー状態と API アクセス</text>
  <g class="dim"><circle cx="295" cy="400" r="80" fill="#fff" stroke="#94a3b8" stroke-width="2"/><text x="225" y="395" class="st">予約済み</text><text x="225" y="425" font-size="20" fill="#64748b">(reserved)</text></g>
  <line x1="375" y1="400" x2="450" y2="400" class="line"/>
  <circle cx="600" cy="400" r="100" fill="#dcfce7" stroke="#22c55e" stroke-width="4"/>
  <text x="525" y="395" class="st">認証済み</text>
  <text x="510" y="428" font-size="22" fill="#15803d">(authenticated)</text>
  <line x1="700" y1="400" x2="775" y2="400" class="line"/>
  <g class="dim"><circle cx="900" cy="400" r="80" fill="#fff" stroke="#94a3b8" stroke-width="2"/><text x="830" y="395" class="st">接続済み</text><text x="830" y="425" font-size="20" fill="#64748b">(connected)</text></g>
  <rect x="780" y="510" width="240" height="60" rx="14" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
  <text x="810" y="550" class="bad">API アクセス不可！</text>
  <line x1="900" y1="480" x2="900" y2="510" stroke="#ef4444" stroke-width="3"/>
  <rect x="540" y="200" width="120" height="80" rx="10" fill="#1f2937"/>
  <rect x="555" y="215" width="90" height="50" rx="4" fill="#38bdf8"/>
  <line x1="600" y1="280" x2="600" y2="300" stroke="#94a3b8" stroke-width="2"/>
</svg>
