<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <style>text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans CJK JP',sans-serif;fill:#1f2937}.tag{font-size:22px;fill:#475569;text-decoration:underline}.title{font-size:48px;font-weight:800}.p{font-size:28px}.sub{font-size:25px;fill:#475569}.bullet{fill:#e11d48}</style>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="1020" y="80" class="tag">マルチリージョン運用</text>
  <text x="90" y="155" class="title">SFU サーバーのディスカバリー</text>
  <g transform="translate(110 240)"><polygon points="0,0 14,9 0,18" class="bullet"/><text x="28" y="18" class="p">ユーザーの接続先 SFU サーバーインスタンスの決定が必要</text></g>
  <g transform="translate(110 300)"><polygon points="0,0 14,9 0,18" class="bullet"/><text x="28" y="18" class="p">グループサーバーへ事前問い合わせ</text></g>
  <g transform="translate(170 355)"><polygon points="0,0 12,8 0,16" class="bullet"/><text x="24" y="16" class="sub">レイテンシー最適なリージョンを特定</text></g>
  <g transform="translate(170 400)"><polygon points="0,0 12,8 0,16" class="bullet"/><text x="24" y="16" class="sub">接続数が少なく、負荷の小さいインスタンスを選定</text></g>
</svg>
