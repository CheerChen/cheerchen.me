<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">API Gateway and Lambda load metrics</title>
  <desc id="desc">Three load indicators: API Gateway throttle rate, Lambda concurrent executions, and Lambda scaling rate.</desc>
  <rect width="1200" height="675" fill="#fbfbf8"/>
  <text x="72" y="78" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="34" fill="#365f52">Amazon API Gateway + AWS Lambda の負荷指標</text>
  <text x="1070" y="78" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#33426f">TBS</text>
  <line x1="72" y1="98" x2="1060" y2="98" stroke="#c8d0ca" stroke-width="3"/>
  <g font-family="Avenir, Helvetica, Arial, sans-serif" font-size="21" fill="#4b5853">
    <text x="95" y="150" text-decoration="underline">Amazon API Gateway</text>
    <text x="116" y="192" fill="#d45542" font-weight="700">• Throttle Rate</text>
    <text x="150" y="225">• 秒間リクエスト数の制限（リージョンレベル）</text>
    <text x="150" y="258">• デフォルト: 10,000 req/s</text>
    <text x="95" y="320" text-decoration="underline">AWS Lambda</text>
    <text x="116" y="360" fill="#d45542" font-weight="700">• Concurrent executions（同時実行数）</text>
    <text x="150" y="393">• 同時実行数 = 1 秒あたりのリクエスト数 × 1 リクエストの所要時間（秒）</text>
    <text x="150" y="426">• デフォルト: 1,000</text>
    <text x="116" y="486" fill="#d45542" font-weight="700">• Scaling Rate</text>
    <text x="150" y="519">• コンピューティング環境が新規にデプロイされるレート</text>
    <text x="150" y="552">• 10 秒ごとに 1,000 インスタンス（もしくは 10,000 req/s）</text>
  </g>
  <g transform="translate(760 340)">
    <text x="0" y="0" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="17" fill="#6c6c6c">Cold start と invoke は同時実行枠を占有する</text>
    <line x1="0" y1="45" x2="340" y2="45" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="312" y="36" font-family="Avenir" font-size="14" fill="#777">time</text>
    <g font-family="Avenir" font-size="13" fill="#fff">
      <rect x="22" y="70" width="62" height="24" fill="#b48aec"/><text x="53" y="87" text-anchor="middle">Init</text>
      <rect x="84" y="70" width="142" height="24" fill="#7f7fe8"/><text x="155" y="87" text-anchor="middle">Invoke</text>
      <rect x="62" y="118" width="62" height="24" fill="#b48aec"/><text x="93" y="135" text-anchor="middle">Init</text>
      <rect x="124" y="118" width="142" height="24" fill="#7f7fe8"/><text x="195" y="135" text-anchor="middle">Invoke</text>
      <rect x="150" y="166" width="62" height="24" fill="#b48aec"/><text x="181" y="183" text-anchor="middle">Init</text>
      <rect x="212" y="166" width="118" height="24" fill="#7f7fe8"/><text x="271" y="183" text-anchor="middle">Invoke</text>
    </g>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#999"/></marker></defs>
</svg>