<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Kustamie architecture overview</title>
  <desc id="desc">Architecture diagram separating event information APIs from IVS video, chat, and realtime data paths.</desc>
  <rect width="1200" height="675" fill="#fbfbf8"/>
  <text x="72" y="76" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="34" fill="#365f52">Kustamie のアーキテクチャ（概要）</text>
  <text x="1070" y="76" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#33426f">TBS</text>
  <line x1="72" y1="96" x2="1060" y2="96" stroke="#c8d0ca" stroke-width="3"/>
  <g font-family="Avenir, Helvetica, Arial, sans-serif" font-size="19" fill="#4b5853">
    <text x="90" y="140">• Kustamie の通信は「イベント情報取得」と「映像音声・リアルタイムデータ」に分離</text>
    <text x="120" y="172">• イベント情報: Amazon ECS + Amazon RDS / API Gateway + Lambda</text>
    <text x="120" y="202">• 映像音声・リアルタイムデータ: Amazon IVS / IVS Chat</text>
  </g>
  <g transform="translate(70 292)">
    <circle cx="25" cy="38" r="12" fill="none" stroke="#6c8d7d" stroke-width="3"/>
    <circle cx="56" cy="38" r="12" fill="none" stroke="#6c8d7d" stroke-width="3"/>
    <circle cx="40" cy="16" r="12" fill="none" stroke="#6c8d7d" stroke-width="3"/>
    <path d="M7 76c5-21 32-21 37 0M38 76c5-21 32-21 37 0M22 52c5-18 31-18 36 0" fill="none" stroke="#6c8d7d" stroke-width="3"/>
    <text x="0" y="116" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="18" fill="#4b5853">Client</text>
  </g>
  <rect x="365" y="222" width="665" height="228" rx="10" fill="#f7f9fb" stroke="#9ba8c7" stroke-width="2"/>
  <text x="385" y="250" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="18" fill="#62717a">AWS Cloud / VPC</text>
  <g font-family="Avenir, Helvetica, Arial, sans-serif" font-size="16" text-anchor="middle">
    <rect x="210" y="315" width="130" height="72" rx="8" fill="#e73f76"/>
    <text x="275" y="346" fill="white" font-weight="700">API Gateway</text>
    <text x="275" y="369" fill="white">Regional API</text>
    <rect x="470" y="270" width="120" height="58" rx="8" fill="#f48120"/>
    <text x="530" y="304" fill="white" font-weight="700">Lambda</text>
    <rect x="470" y="352" width="120" height="58" rx="8" fill="#f48120"/>
    <text x="530" y="386" fill="white" font-weight="700">Lambda</text>
    <rect x="670" y="312" width="150" height="68" rx="8" fill="#f48120"/>
    <text x="745" y="340" fill="white" font-weight="700">Amazon ECS</text>
    <text x="745" y="362" fill="white">Application</text>
    <rect x="895" y="268" width="150" height="58" rx="8" fill="#b547c8"/>
    <text x="970" y="294" fill="white" font-weight="700">ElastiCache</text>
    <text x="970" y="315" fill="white">Valkey</text>
    <rect x="895" y="362" width="150" height="58" rx="8" fill="#b547c8"/>
    <text x="970" y="386" fill="white" font-weight="700">RDS</text>
    <text x="970" y="407" fill="white" font-size="14">Aurora Serverless v2</text>
    <rect x="495" y="485" width="150" height="70" rx="8" fill="#f48120"/>
    <text x="570" y="516" fill="white" font-weight="700">IVS Chat</text>
    <text x="570" y="538" fill="white">WebSocket</text>
    <rect x="495" y="575" width="150" height="70" rx="8" fill="#f48120"/>
    <text x="570" y="606" fill="white" font-weight="700">IVS</text>
    <text x="570" y="628" fill="white">Video / Realtime</text>
  </g>
  <g stroke="#77857f" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M150 348H210"/>
    <path d="M340 348H470"/>
    <path d="M590 299H670"/>
    <path d="M590 381H670"/>
    <path d="M820 340H895"/>
    <path d="M820 366H895"/>
    <path d="M150 382C260 470 390 512 495 518"/>
    <path d="M150 416C260 540 390 606 495 610"/>
    <path d="M745 366C745 475 665 505 645 515"/>
  </g>
  <g font-family="Avenir, Helvetica, Arial, sans-serif" font-size="16" fill="#586962">
    <rect x="146" y="368" width="105" height="24" fill="#fbfbf8"/>
    <text x="155" y="386">イベント情報</text>
    <rect x="188" y="449" width="95" height="24" fill="#fbfbf8"/>
    <text x="195" y="468">WebSocket</text>
    <rect x="208" y="529" width="55" height="24" fill="#fbfbf8"/>
    <text x="215" y="548">映像</text>
    <rect x="662" y="448" width="190" height="24" fill="#fbfbf8"/>
    <text x="672" y="466">インタラクティブデータ</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#77857f"/></marker>
  </defs>
</svg>