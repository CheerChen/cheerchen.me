<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Video moderation concept</title>
  <desc id="desc">Concept for snapshot-based video moderation using Amazon IVS and Amazon Bedrock Nova Lite.</desc>
  <rect width="1200" height="675" fill="#fbfbf8"/>
  <text x="72" y="78" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="34" fill="#365f52">映像モデレーションの構想</text>
  <text x="1070" y="78" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#33426f">TBS</text>
  <line x1="72" y1="98" x2="1060" y2="98" stroke="#c8d0ca" stroke-width="3"/>
  <text x="90" y="150" font-family="Avenir" font-size="22" fill="#4b5853">チャットモデレーションと同様に、配信映像の自動チェックを行いたい</text>
  <g transform="translate(105 250)" font-family="Avenir" font-size="16" text-anchor="middle">
    <rect x="0" y="120" width="92" height="70" rx="8" fill="#f48120"/><text x="46" y="152" fill="white" font-weight="700">Amazon</text><text x="46" y="174" fill="white">IVS</text>
    <text x="142" y="145" fill="#6b716d">スナップショット</text>
    <rect x="205" y="0" width="430" height="310" fill="#fff" stroke="#7890d6" stroke-width="2"/>
    <rect x="230" y="35" width="380" height="38" fill="#f6f7fb" stroke="#b6c0df"/><text x="420" y="60" fill="#4b5853">配信タイトル・説明文</text>
    <rect x="230" y="88" width="380" height="190" fill="#e8eef0" stroke="#c3c8c8"/>
    <path d="M250 230 C300 180 360 220 410 160 C465 95 540 130 585 92" fill="none" stroke="#d86b37" stroke-width="10"/>
    <circle cx="335" cy="175" r="32" fill="#e85722"/><rect x="465" y="215" width="96" height="48" fill="#6b7280" opacity="0.55"/>
    <text x="514" y="245" fill="white" font-size="14">face cam</text>
    <text x="420" y="302" fill="#6b716d" font-size="14">複合画面の snapshot（人物詳細は省略）</text>
    <rect x="710" y="55" width="290" height="86" rx="24" fill="#8cc563"/>
    <path d="M815 137l30 45 18-45" fill="#8cc563"/>
    <text x="855" y="90" fill="#365f52" font-weight="700">ペルソナ</text>
    <text x="855" y="118" fill="#365f52">映像が有害でないか確認するプロです...</text>
    <rect x="795" y="205" width="110" height="78" rx="8" fill="#19a690"/><text x="850" y="238" fill="white" font-weight="700">Bedrock</text><text x="850" y="262" fill="white">Nova Lite</text>
    <rect x="955" y="220" width="120" height="50" rx="4" fill="#fff" stroke="#8797c7" stroke-width="2"/><text x="1015" y="251" fill="#4b5853" font-family="Menlo, monospace" font-size="13">categories: []</text>
    <path d="M92 155H205M635 155H795M905 244H955" fill="none" stroke="#566ed1" stroke-width="3" marker-end="url(#arrow)"/>
  </g>
  <g font-family="Avenir" font-size="19" fill="#4b5853">
    <text x="100" y="606">• 配信映像のスナップショットを Nova Lite に与え、不適切な映像やアクションがないか判断する</text>
    <text x="122" y="635">• 必要に応じて配信主催者へ通知する</text>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#566ed1"/></marker></defs>
</svg>